<style>

*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07111f;color:var(--ink)}

.layout{position:relative;height:100%;display:grid;grid-template-rows:auto 1fr;gap:34px;padding:92px 82px 78px}.ipad .layout{grid-template-columns:.9fr 1.1fr;grid-template-rows:1fr;gap:58px;padding:128px 112px}.copy{align-self:end}.eyebrow{display:inline-flex;gap:.55em;align-items:center;padding:12px 16px;border:1px solid var(--stroke);border-radius:999px;background:rgba(255,255,255,.10);backdrop-filter:blur(18px);font-size:28px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#d7fff1}.ipad .eyebrow{font-size:29px}.icon{width:52px;height:52px;border-radius:15px;box-shadow:0 18px 46px #0007}h1{font-size:84px;line-height:.92;letter-spacing:-.075em;margin:28px 0 22px;max-width:1100px}.iphone65 h1{font-size:78px}.ipad h1{font-size:88px}.sub{font-size:35px;line-height:1.22;color:#d5deec;max-width:1050px;margin:0}.iphone65 .sub{font-size:32px}.ipad .sub{font-size:35px}.deviceWrap{display:flex;align-items:center;justify-content:center;min-height:0}.phone{width:min(76vw,720px);height:1480px;border-radius:92px;padding:24px;background:linear-gradient(145deg,#f8fafc66,#020617 12%,#0f172a 86%,#ffffff55);box-shadow:0 44px 120px #0008, inset 0 0 0 2px rgba(255,255,255,.18)}.iphone65 .phone{height:1380px;width:min(75vw,660px)}.ipad .phone{width:860px;height:1160px;border-radius:54px;padding:22px}.screen{height:100%;border-radius:72px;background:#f7f9ff;color:#111827;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.45)}.ipad .screen{border-radius:38px}.screen:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top left,#4dd6ad38,transparent 34%),radial-gradient(circle at bottom right,#387af534,transparent 38%),linear-gradient(145deg,#f8fbff,#eef5ff)}.app{position:relative;height:100%;padding:42px;display:flex;flex-direction:column;gap:28px}.ipad .app{padding:48px}.rail{display:flex;gap:10px;overflow:hidden}.rail span{border-radius:999px;background:#e2e8f0;color:#64748b;padding:14px 19px;font-weight:850;font-size:22px;white-space:nowrap}.rail span.on{background:#111827;color:white}.card{background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.9);box-shadow:0 20px 70px rgba(15,23,42,.12);border-radius:42px;padding:34px}.miniBadge{display:inline-flex;gap:12px;align-items:center;color:#0f766e;font-weight:950;letter-spacing:.08em;text-transform:uppercase;font-size:21px}.glyph{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--secondary));display:grid;place-items:center;color:white;font-weight:950;font-size:25px;box-shadow:0 20px 45px #387af544}.app h2{font-size:54px;line-height:.96;letter-spacing:-.065em;margin:22px 0 14px}.app p{font-size:25px;line-height:1.36;color:#64748b;margin:0}.button{border-radius:30px;background:linear-gradient(135deg,var(--accent),var(--secondary));color:white;font-weight:950;font-size:26px;text-align:center;padding:24px 28px;box-shadow:0 20px 48px #387af544}.chips{display:flex;gap:12px;flex-wrap:wrap}.chip{border-radius:999px;background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4;font-weight:900;font-size:20px;padding:12px 15px}.field{border:1px solid #dbe3ef;background:#f8fafc;border-radius:24px;padding:20px;color:#64748b;font-size:22px}.textarea{min-height:185px}.label{font-size:19px;font-weight:950;margin-bottom:8px;color:#334155}.status{display:flex;gap:12px;align-items:flex-start;border-radius:26px;padding:20px;background:#ecfdf5;border:1px solid #bbf7d0;color:#166534;font-weight:850;font-size:21px}.heroPanel{background:linear-gradient(135deg,#16325d,#050b16);border-radius:40px;color:white;padding:38px;min-height:370px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14)}.heroPanel .k{font-size:20px;font-weight:950;letter-spacing:.09em;text-transform:uppercase;color:#b7fff0}.heroPanel h2{color:white;font-size:58px;margin:15px 0 14px}.heroPanel p{color:#d5deec}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.metric{background:rgba(255,255,255,.82);border:1px solid white;border-radius:28px;padding:22px}.metric strong{display:block;font-size:34px;letter-spacing:-.04em}.metric span{font-size:18px;color:#64748b;font-weight:800}.feature{display:flex;gap:16px;align-items:flex-start;background:#0f172a08;border-radius:28px;padding:22px}.feature h3{font-size:24px;margin:0 0 5px}.feature p{font-size:20px}.star{width:42px;height:42px;border-radius:999px;flex:0 0 auto;background:linear-gradient(135deg,var(--accent),var(--secondary));color:white;display:grid;place-items:center;font-weight:950}.files{display:grid;gap:15px}.file{display:flex;justify-content:space-between;align-items:center;background:#0f172a08;border-radius:26px;padding:22px}.file b{font-size:24px}.file span{font-size:19px;color:#64748b;font-weight:800}.guide{background:#eef6ff;border:1px solid #dbeafe;border-radius:30px;padding:24px}.guide ol{font-size:22px;line-height:1.45;margin:10px 0 0 28px;color:#334155}.exportActions{display:grid;grid-template-columns:1fr 1fr;gap:14px}.secondary{border-radius:30px;background:white;border:1px solid #cbd5e1;color:#334155;font-weight:950;font-size:24px;text-align:center;padding:22px}.footer{position:absolute;left:82px;right:82px;bottom:34px;display:flex;justify-content:space-between;color:#cbd5e1;font-weight:850;font-size:22px}.ipad .footer{left:112px;right:112px;bottom:48px;font-size:24px}.ipad .deviceWrap{align-self:center}.ipad .copy{align-self:center}.ipad .phone .app{gap:22px}.ipad .app h2{font-size:48px}.ipad .app p{font-size:23px}.ipad .heroPanel h2{font-size:54px}
</style>
</head>
<body>
<div id="stage" class="stage"><div class="grid"></div><div class="layout"><section class="copy"><div class="eyebrow"><img class="icon" src="AppIcon-1024.png"> InterfaceForge</div><h1 id="headline"></h1><p id="sub" class="sub"></p></section><section class="deviceWrap"><div class="phone"><div class="screen"><div id="app" class="app"></div></div></div></section></div><div class="footer"><span>AI interface generation</span><span>Bring your own provider key</span></div></div>
<script>
const p=new URLSearchParams(location.search);const screen=p.get('screen')||'home';const size=p.get('size')||'iphone69';document.body.classList.add(size==='ipad'?'ipad':size==='iphone65'?'iphone65':'iphone69');
const copy={home:['Design polished UI from one clear prompt.','Generate prompt-specific previews and starter code with your OpenAI-compatible provider. Fallback templates stay clearly labeled.'],create:['A friendlier way to connect AI.','Provider settings are explained in plain language, with clear status, privacy notes, and no hidden keys.'],preview:['Preview what the prompt actually asked for.','AI output becomes adaptive sections, metrics, forms, actions, and export-ready component structure.'],export:['Turn the result into starter files.','Copy or share React, HTML/CSS, and SwiftUI packages with beginner handoff notes.']};
document.getElementById('headline').textContent=copy[screen][0];document.getElementById('sub').textContent=copy[screen][1];
const rail=(on)=>`<div class="rail">${['Describe','Generate','Customize','Preview','Export'].map((x,i)=>`<span class="${i<=on?'on':''}">${x}</span>`).join('')}</div>`;
const app=document.getElementById('app');
if(screen==='home')app.innerHTML=`${rail(0)}<div class="card"><div class="miniBadge"><span class="glyph">IF</span> AI interface generation</div><h2>Design polished UI from one clear prompt.</h2><p>Bring your own provider key, describe the interface, then preview and export starter code. If AI cannot run, the app marks the output as fallback.</p></div><div class="button">Create with AI</div><div class="chips"><span class="chip">Provider key</span><span class="chip">Remote AI disclosure</span><span class="chip">Starter exports</span></div><div class="card"><div class="miniBadge">Guided flow</div><p>Describe, generate, customize, preview, and export without needing a debug-panel mindset.</p></div>`;
if(screen==='create')app.innerHTML=`${rail(1)}<div class="card"><div class="miniBadge"><span class="glyph">✦</span> Prompt</div><h2>What should the UI do?</h2><div class="field textarea">A landing-page hero for a space tourism startup with waitlist signup and safety stats</div><div class="chips"><span class="chip">Pricing</span><span class="chip">Dashboard</span><span class="chip">Waitlist</span></div></div><div class="card"><div class="miniBadge">AI provider connection</div><p>Prompts are sent to your configured OpenAI-compatible endpoint. Keys stay on this device for the MVP.</p><div class="label">API key</div><div class="field">••••••••••••••••</div><div class="label">Endpoint</div><div class="field">https://api.openai.com/v1/chat/completions</div></div><div class="status">✓ AI engine configured. Ready to generate prompt-specific output.</div>`;
if(screen==='preview')app.innerHTML=`${rail(3)}<div class="card"><div class="miniBadge"><span class="glyph">AI</span> AI-powered preview</div><p>Generated with the configured provider from the space tourism waitlist prompt.</p></div><div class="heroPanel"><div class="k">Space tourism launch</div><h2>Book your first safe orbit.</h2><p>Join the civilian flight waitlist with training, medical review, and mission-ready safety stats.</p></div><div class="metrics"><div class="metric"><strong>98%</strong><span>training pass</span></div><div class="metric"><strong>12k</strong><span>waitlist</span></div><div class="metric"><strong>24/7</strong><span>ops watch</span></div></div><div class="feature"><div class="star">✦</div><div><h3>Crew-ready onboarding</h3><p>Explain eligibility, flight timeline, and safety checks before signup.</p></div></div><div class="button">Join waitlist</div>`;
if(screen==='export')app.innerHTML=`${rail(4)}<div class="card"><div class="miniBadge"><span class="glyph">↗</span> Export package</div><h2>Starter code, clearly packaged.</h2><p>Each export includes the generated component, styles, and a README for handoff.</p></div><div class="files"><div class="file"><b>Component.jsx</b><span>React</span></div><div class="file"><b>styles.css</b><span>Responsive CSS</span></div><div class="file"><b>README.md</b><span>Setup steps</span></div></div><div class="guide"><div class="miniBadge">Beginner guide</div><ol><li>Copy the files into your project.</li><li>Import the component on the target page.</li><li>Customize copy, fields, and actions.</li></ol></div><div class="exportActions"><div class="button">Copy code</div><div class="secondary">Share package</div></div>`;
</script>
</body>
</html>
